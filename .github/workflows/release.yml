name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            ext: .exe
            arch: x64
          - os: macos-latest
            target: macos
            ext: ''
            arch: x64
          - os: ubuntu-latest
            target: linux
            ext: ''
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gir1.2-appindicator3-0.1 xclip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller build.spec --noconfirm

      - name: Prepare release package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp dist/llm-route.exe release/
          cp config.yaml release/
          cp -r presets release/ 2>/dev/null || mkdir -p release/presets
          cp README.md release/ 2>/dev/null || echo ""
          cd release && 7z a -tzip ../llm-route-${{ matrix.target }}-${{ matrix.arch }}.zip *

      - name: Prepare release package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          # macOS 生成 .app 目录
          cp -r dist/LLM-ROUTE.app release/
          cp config.yaml release/
          cp -r presets release/ 2>/dev/null || mkdir -p release/presets
          cp README.md release/ 2>/dev/null || echo ""
          cd release && zip -r ../llm-route-${{ matrix.target }}-${{ matrix.arch }}.zip *

      - name: Prepare release package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp dist/llm-route release/
          cp config.yaml release/
          cp -r presets release/ 2>/dev/null || mkdir -p release/presets
          cp README.md release/ 2>/dev/null || echo ""
          cd release && zip -r ../llm-route-${{ matrix.target }}-${{ matrix.arch }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-route-${{ matrix.target }}-${{ matrix.arch }}
          path: llm-route-${{ matrix.target }}-${{ matrix.arch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Extract version from tag
        id: version
        run: |
          # Remove 'v' prefix if present (v1.2.3 -> 1.2.3)
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Extract changelog section for this version
          # Format: ## [version] - date or ## [version]
          CHANGELOG_CONTENT=$(awk -v ver="$VERSION" '
            /^## \[/ { in_section=0 }
            $0 ~ "^## \\[" ver "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md)

          # If no specific version found, try Unreleased section
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT=$(awk '
              /^## \[Unreleased\]/ { in_section=1; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' CHANGELOG.md)
          fi

          # Write to file for multiline output
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
