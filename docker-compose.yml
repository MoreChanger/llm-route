# LLM-ROUTE Docker Compose Configuration
# Usage: docker compose up -d

services:
  # Headless mode (default) - API routing only
  llm-route:
    build:
      context: .
      target: headless
    image: llm-route:latest
    container_name: llm-route
    restart: unless-stopped
    ports:
      - "${LLM_ROUTE_PORT:-8087}:8087"
    volumes:
      # Persist configuration
      - ./config.yaml:/app/config.yaml:ro
      # Persist logs
      - llm-route-logs:/app/logs
      # Persist presets (optional)
      - ./presets:/app/presets:ro
    environment:
      - LLM_ROUTE_PORT=${LLM_ROUTE_PORT:-8087}
      - LLM_ROUTE_LOG_LEVEL=${LLM_ROUTE_LOG_LEVEL:-1}
      - LLM_ROUTE_HEADLESS=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8087/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Full mode with GUI support (requires X11 forwarding)
  llm-route-gui:
    build:
      context: .
      target: full
    image: llm-route:full
    container_name: llm-route-gui
    restart: unless-stopped
    ports:
      - "${LLM_ROUTE_PORT:-8087}:8087"
    volumes:
      # Persist configuration
      - ./config.yaml:/app/config.yaml:ro
      # Persist logs
      - llm-route-logs:/app/logs
      # Persist presets (optional)
      - ./presets:/app/presets:ro
      # X11 socket for GUI (Linux only)
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    environment:
      - LLM_ROUTE_PORT=${LLM_ROUTE_PORT:-8087}
      - LLM_ROUTE_LOG_LEVEL=${LLM_ROUTE_LOG_LEVEL:-1}
      - DISPLAY=${DISPLAY}
    profiles:
      - gui

volumes:
  llm-route-logs:
    name: llm-route-logs
