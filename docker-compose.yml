# LLM-ROUTE Docker Compose Configuration
# Usage: docker compose up -d

services:
  # Headless mode (default) - API routing only
  llm-route:
    build:
      context: .
      target: headless
    image: llm-route:latest
    container_name: llm-route
    restart: unless-stopped
    ports:
      - "${LLM_ROUTE_PORT:-8087}:8087"
    volumes:
      # Persist configuration (writable for web admin config editing)
      # Note: File permissions are inherited from host. If write fails, run:
      #   chmod 666 config.yaml
      - ./config.yaml:/app/config.yaml
      # Persist logs
      - llm-route-logs:/app/logs
      # Persist presets (optional)
      - ./presets:/app/presets:ro
    environment:
      - LLM_ROUTE_PORT=${LLM_ROUTE_PORT:-8087}
      - LLM_ROUTE_LOG_LEVEL=${LLM_ROUTE_LOG_LEVEL:-1}
      - LLM_ROUTE_HEADLESS=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8087/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  llm-route-logs:
    name: llm-route-logs
