host: 127.0.0.1
port: 8087
log_level: 2
upstreams:
  anthropic:
    url: https://modelservice.jdcloud.com/coding/anthropic
    protocol: anthropic
  openai:
    url: https://modelservice.jdcloud.com/coding/openai
    protocol: openai
  # 新增：Ollama 示例，启用 Responses 转换
  # ollama:
  #   url: http://localhost:11434/v1
  #   protocol: openai
  #   convert_responses: true
routes:
- path: /v1/messages
  upstream: anthropic
- path: /v1/models
  upstream: openai
- path: /v1/chat/completions
  upstream: openai
- path: /models
  upstream: anthropic
  # 新增：/responses 路由示例
  # - path: /responses
  #   upstream: ollama
retry_rules:
- status: 400
  body_contains: overloaded
  max_retries: 10
  delay: 2
  jitter: 1
- status: 400
  body_contains: Too many requests
  max_retries: 10
  delay: 2
  jitter: 1
- status: 429
  max_retries: 10
  delay: 2
  jitter: 1
- status: 500
  max_retries: 5
  delay: 3
  jitter: 1
