host: 0.0.0.0
port: 8087
log_level: 2
# Web 管理界面密码（bcrypt 哈希）
# 生成方法: python -c "import bcrypt; print(bcrypt.hashpw(b'your-password', bcrypt.gensalt()).decode())"
# admin_password_hash: $2b$12$...
upstreams:
  anthropic:
    url: https://modelservice.jdcloud.com/coding/anthropic
    protocol: anthropic
  openai:
    url: https://modelservice.jdcloud.com/coding/openai
    protocol: openai
    convert_responses: true
routes:
- path: /v1/messages
  upstream: anthropic
- path: /v1/models
  upstream: openai
- path: /v1/chat/completions
  upstream: openai
- path: /v1/responses
  upstream: openai
- path: /models
  upstream: anthropic
retry_rules:
- status: 400
  body_contains: overloaded
  max_retries: 10
  delay: 2
  jitter: 1
- status: 400
  body_contains: Too many requests
  max_retries: 10
  delay: 2
  jitter: 1
- status: 429
  max_retries: 10
  delay: 2
  jitter: 1
- status: 500
  max_retries: 5
  delay: 3
  jitter: 1
