host: 0.0.0.0
port: 8087
log_level: 2
log_retention_days: 7
# Web 管理界面密码
# 默认密码为 123456，首次登录后建议修改
admin_password: "123456"
# 密码哈希（修改密码后自动生成，优先使用）
admin_password_hash:
upstreams:
  anthropic:
    url: https://modelservice.jdcloud.com/coding/anthropic
    protocol: anthropic
  openai:
    url: https://modelservice.jdcloud.com/coding/openai
    protocol: openai
    convert_responses: true
routes:
- path: /v1/messages
  upstream: anthropic
- path: /v1/models
  upstream: openai
- path: /v1/chat/completions
  upstream: openai
- path: /v1/responses
  upstream: openai
- path: /models
  upstream: anthropic
retry_rules:
- status: 400
  body_contains: overloaded
  max_retries: 10
  delay: 2
  jitter: 1
- status: 400
  body_contains: Too many requests
  max_retries: 10
  delay: 2
  jitter: 1
- status: 429
  max_retries: 10
  delay: 2
  jitter: 1
- status: 500
  max_retries: 5
  delay: 3
  jitter: 1
