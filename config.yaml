# 监听地址（默认 127.0.0.1）
host: 127.0.0.1

# 端口配置
# - 数字：指定端口
# - auto：随机分配
# - 省略：默认 8087
port: 8087

# 上游服务配置（示例）
# upstreams:
#   anthropic:
#     url: https://api.anthropic.com
#     protocol: anthropic
#   openai:
#     url: https://api.openai.com
#     protocol: openai

# 路径路由规则（示例）
# routes:
#   - path: /v1/messages
#     upstream: anthropic
#   - path: /v1/chat/completions
#     upstream: openai
#   - path: /v1/models
#     upstream: openai

# 重试规则（按顺序匹配）
retry_rules:
  - status: 400
    body_contains: "overloaded"
    max_retries: 10
    delay: 2
    jitter: 1
  - status: 400
    body_contains: "Too many requests"
    max_retries: 10
    delay: 2
    jitter: 1
  - status: 429
    max_retries: 10
    delay: 2
    jitter: 1
  - status: 500
    max_retries: 5
    delay: 3
    jitter: 1
